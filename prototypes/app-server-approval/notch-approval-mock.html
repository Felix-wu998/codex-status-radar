<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex Status Radar - Approval Notch Mock</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #10110f;
      --panel: #1c1d1a;
      --panel-strong: #262820;
      --line: #3a3d32;
      --text: #f4f1e8;
      --muted: #b5b1a4;
      --green: #45d483;
      --yellow: #f3c94d;
      --red: #ff6b5f;
      --blue: #6eb7ff;
      --shadow: rgba(0, 0, 0, 0.45);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 35%),
        var(--bg);
      color: var(--text);
      display: grid;
      place-items: start center;
      padding: 28px 20px;
    }

    .desktop {
      width: min(1100px, 100%);
      min-height: 680px;
      position: relative;
      border: 1px solid #2c2e29;
      background:
        linear-gradient(180deg, #171815 0, #11120f 100%);
      box-shadow: 0 30px 90px var(--shadow);
      overflow: hidden;
    }

    .menu {
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      color: #dad6c9;
      font-size: 13px;
      border-bottom: 1px solid #262821;
      background: rgba(255, 255, 255, 0.035);
    }

    .dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #6a6d63;
    }

    .dot:nth-child(1) { background: #ff5f57; }
    .dot:nth-child(2) { background: #febc2e; }
    .dot:nth-child(3) { background: #28c840; }

    .notch-shell {
      position: absolute;
      left: 50%;
      top: 0;
      width: min(540px, calc(100% - 32px));
      transform: translateX(-50%);
      display: grid;
      justify-items: center;
      pointer-events: none;
    }

    .camera-notch {
      width: 214px;
      height: 34px;
      background: #050505;
      border-radius: 0 0 18px 18px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.38);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      pointer-events: auto;
      cursor: pointer;
    }

    .status-light {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--yellow);
      box-shadow: 0 0 18px rgba(243, 201, 77, 0.8);
    }

    .notch-label {
      font-size: 12px;
      color: #f8ecc1;
      white-space: nowrap;
    }

    .approval-card {
      width: 100%;
      margin-top: 10px;
      background: color-mix(in srgb, var(--panel) 95%, black 5%);
      border: 1px solid var(--line);
      box-shadow: 0 24px 72px var(--shadow);
      border-radius: 8px;
      padding: 14px;
      pointer-events: auto;
    }

    .approval-head {
      display: grid;
      grid-template-columns: 38px 1fr auto;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .icon {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: rgba(243, 201, 77, 0.14);
      color: var(--yellow);
      font-size: 21px;
    }

    .title-group {
      min-width: 0;
    }

    .title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pill {
      font-size: 12px;
      color: #15130b;
      background: var(--yellow);
      border-radius: 999px;
      padding: 5px 9px;
      font-weight: 700;
      white-space: nowrap;
    }

    .command {
      margin: 14px 0 12px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #34372d;
      background: #141511;
      color: #e9e2d1;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      word-break: break-word;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    button {
      appearance: none;
      border: 1px solid #43483c;
      background: var(--panel-strong);
      color: var(--text);
      min-height: 40px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover {
      border-color: #737a68;
      background: #303326;
    }

    .approve {
      background: rgba(69, 212, 131, 0.16);
      border-color: rgba(69, 212, 131, 0.45);
      color: #c9ffdc;
    }

    .session {
      background: rgba(110, 183, 255, 0.16);
      border-color: rgba(110, 183, 255, 0.45);
      color: #d8ecff;
    }

    .deny {
      background: rgba(255, 107, 95, 0.14);
      border-color: rgba(255, 107, 95, 0.45);
      color: #ffd8d4;
    }

    .workspace {
      position: absolute;
      inset: 80px 30px 30px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
    }

    .side,
    .main {
      border: 1px solid #282a24;
      background: rgba(255, 255, 255, 0.025);
      border-radius: 8px;
      padding: 16px;
      min-width: 0;
    }

    .side h2,
    .main h2 {
      margin: 0 0 14px;
      font-size: 14px;
      font-weight: 700;
      color: #ece5d3;
    }

    .row {
      display: grid;
      grid-template-columns: 10px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 0;
      border-top: 1px solid #272923;
      font-size: 13px;
      color: var(--muted);
    }

    .row:first-of-type {
      border-top: 0;
    }

    .mini-light {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
    }

    .mini-light.waiting {
      background: var(--yellow);
      box-shadow: 0 0 12px rgba(243, 201, 77, 0.7);
    }

    .main p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
      margin: 0 0 10px;
      max-width: 62ch;
    }

    .result {
      margin-top: 12px;
      min-height: 22px;
      font-size: 13px;
      color: #d9d2bf;
    }

    @media (max-width: 760px) {
      body {
        padding: 12px;
      }

      .desktop {
        min-height: 760px;
      }

      .workspace {
        inset: 310px 14px 14px;
        grid-template-columns: 1fr;
      }

      .approval-card {
        margin-top: 8px;
      }

      .approval-head {
        grid-template-columns: 34px 1fr;
      }

      .pill {
        grid-column: 2;
        width: max-content;
      }

      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="desktop">
    <div class="menu">
      <div class="dots" aria-hidden="true">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <div>Codex 状态雷达</div>
      <div>18:13</div>
    </div>

    <section class="notch-shell" aria-label="Codex approval notch mock">
      <div class="camera-notch" title="waiting-approval">
        <span class="status-light"></span>
        <span class="notch-label">等待审批</span>
      </div>

      <div class="approval-card">
        <div class="approval-head">
          <div class="icon" aria-hidden="true">!</div>
          <div class="title-group">
            <div class="title">临时白板</div>
            <div class="subtitle">Codex 请求执行命令</div>
          </div>
          <div class="pill">waiting-approval</div>
        </div>

        <div class="command">/bin/zsh -lc 'touch /tmp/codex-status-radar-approval-test.txt'</div>

        <div class="actions">
          <button class="approve" data-decision="accept">批准一次</button>
          <button class="session" data-decision="acceptWithExecpolicyAmendment">本次会话批准</button>
          <button class="deny" data-decision="decline">拒绝</button>
        </div>

        <div class="result" id="result">等待用户选择。</div>
      </div>
    </section>

    <section class="workspace">
      <aside class="side">
        <h2>最近项目</h2>
        <div class="row">
          <span class="mini-light waiting"></span>
          <span>临时白板</span>
          <span>等待</span>
        </div>
        <div class="row">
          <span class="mini-light"></span>
          <span>Codex状态雷达</span>
          <span>运行</span>
        </div>
        <div class="row">
          <span class="mini-light"></span>
          <span>Obsidian</span>
          <span>完成</span>
        </div>
      </aside>

      <section class="main">
        <h2>当前摘要</h2>
        <p>Codex 正在验证 app-server 的审批事件链路。当前捕获到的关键状态是 waitingOnApproval，审批请求包含 availableDecisions。</p>
        <p>刘海交互第一版只保留原生审批选择，不扩展额外审批策略。</p>
      </section>
    </section>
  </main>

  <script>
    const result = document.querySelector("#result");
    const labels = {
      accept: "已选择：批准一次",
      acceptWithExecpolicyAmendment: "已选择：本次会话批准",
      decline: "已选择：拒绝",
    };

    document.querySelectorAll("button[data-decision]").forEach((button) => {
      button.addEventListener("click", () => {
        const decision = button.dataset.decision;
        result.textContent = `${labels[decision]}，将回传 decision="${decision}"。`;
      });
    });
  </script>
</body>
</html>
